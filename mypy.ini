[mypy]
# Python version — must match the runtime version used.
python_version = 3.13

# Don't error on third-party libraries that ship without type stubs.
# This covers google-genai, apscheduler, pdfplumber, etc.
ignore_missing_imports = True

# Warn about code that can never be reached (e.g. after an unconditional return).
warn_unreachable = True

# Error on returning Any from typed functions — catches accidental type erasure.
warn_return_any = False

# Show the error code in brackets [arg-type] so suppressions are targeted.
show_error_codes = True


# ---------------------------------------------------------------------------
# Per-module overrides
# ---------------------------------------------------------------------------

# SQLModel's type stubs don't fully express SQLAlchemy's overloaded select()
# and func.count() signatures.  The runtime behaviour is correct; mypy just
# can't verify it.  Rather than scatter # type: ignore across the file, we
# suppress at the module level and tighten incrementally as SQLModel improves.
# SQLAlchemy/SQLModel overloads for select/join and Holding.id typing — runtime is correct.
[mypy-api.services.historical_portfolio]
ignore_errors = True

[mypy-api.routes.metrics]
ignore_errors = True

# SQLModel auto-increment IDs are typed as int | None (they're None before the
# row is flushed to the DB).  These routes always access .id after a flush/commit
# so the None case never occurs at runtime.  Suppress until we add explicit
# assert-not-None guards throughout.
[mypy-api.routes.pipeline]
ignore_errors = True

[mypy-api.routes.scraper]
ignore_errors = True

# Google API client stubs (google-api-python-client) are dynamically generated
# and not fully typed.  The .users() call is valid at runtime.
[mypy-scraper.gmail_client]
ignore_errors = True
