name: CI

# Run on every push to main and on all pull requests.
# Goal: catch regressions (lint, type errors, test failures) before they land.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Type-check + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Single version matching our production runtime.
        python-version: ["3.13"]

    steps:
      # ── 1. Get the code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # Cache pip downloads so subsequent runs are faster.
          cache: pip

      # Fresh pip avoids pip-audit reporting CVEs on the runner's default pip wheel.
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Install CI tools (ruff, mypy, pytest-cov)
        run: pip install ruff mypy pytest-cov

      # ── 3b. Security: scan packages actually installed above (OSV / PyPI advisory DB).
      # We use `pip-audit` without `-r` because pip-audit's isolated `-r` resolver can fail
      # or diverge from `pip install -r requirements.txt` on this tree.
      - name: Audit Python dependencies with pip-audit
        run: |
          pip install pip-audit
          pip-audit

      # ── 4. Lint (ruff) ────────────────────────────────────────────────────
      # ruff is fast (written in Rust) and catches unused imports, naming
      # issues, and style problems.  Errors here fail the build immediately.
      - name: Lint with ruff
        run: ruff check pipeline/ api/ scraper/ agent/ tests/ parsers/

      # ── 5. Type-check (mypy) ──────────────────────────────────────────────
      # mypy reads mypy.ini at the repo root for per-module settings.
      # Third-party libraries without stubs are silenced via ignore_missing_imports.
      - name: Type-check with mypy
        run: mypy pipeline/ api/ scraper/ agent/ parsers/

      # ── 5b. AI prompts: every YAML under prompts/ must parse (catches bad edits before runtime)
      - name: Validate prompt YAML files
        run: |
          python -c "
          import pathlib
          import yaml
          for p in sorted(pathlib.Path('prompts').rglob('*.yaml')):
              yaml.safe_load(p.read_text(encoding='utf-8'))
          print('OK:', len(list(pathlib.Path('prompts').rglob('*.yaml'))), 'yaml files')
          "

      # ── 6. Tests (pytest + coverage) ──────────────────────────────────────
      # -m "not slow" excludes any test marked @pytest.mark.slow (LLM API calls).
      # Email parser / orchestrator tests that need gitignored fixture files are
      # automatically skipped via pytestmark skipif (no fixture dir in CI).
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -m "not slow" \
            --cov=pipeline \
            --cov=api \
            --cov=agent \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=35 \
            -q
        env:
          # Tests use in-memory SQLite; no real keys needed.
          # Classifier keys: pipeline/config prefers *_FOR_CLASSIFIER, then legacy names.
          OPENAI_API_KEY_FOR_CLASSIFIER: dummy
          ANTHROPIC_API_KEY_FOR_CLASSIFIER: dummy
          GOOGLE_API_KEY_FOR_CLASSIFIER: dummy
          OPENAI_API_KEY: dummy
          ANTHROPIC_API_KEY: dummy
          GOOGLE_API_KEY: dummy
          APP_ENV: test
          # Deterministic cookie / WS ticket signing for tests (see api/auth.py).
          AUTH_SECRET_KEY: ci-only-not-a-secret-fixed-for-deterministic-tests

      # ── 7. Upload coverage report ─────────────────────────────────────────
      # Stored as a build artifact so you can download and inspect it.
      # Visit: Actions → this run → Artifacts → coverage-report
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  dashboard:
    name: Dashboard (audit + ESLint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      # High/critical supply-chain issues only; moderate/low stay informational.
      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Lint with ESLint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
        env:
          # Explicit CI defaults; api-base.ts already falls back if unset.
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_WS_URL: ws://127.0.0.1:8000
