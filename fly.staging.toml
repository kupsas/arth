# Staging Fly app — same image and routing as production ``fly.toml``, different ``app`` name.
# Deploy: ``fly deploy --config fly.staging.toml``
# URL: https://arth-demo-staging.fly.dev (after ``fly apps create arth-demo-staging``)

app = 'arth-demo-staging'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile.demo'
  [build.args]
    NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN = "phc_vG5JZXyDBeMkNbBNJqGhKB6uCN9bxot8FCR6RwTNsPm2"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.http_options.replay_cache]]
    path_prefix = "/"
    ttl_seconds = 86400
    type = "cookie"
    name = "demo_session_id"

  [[http_service.checks]]
    grace_period = "45s"
    interval = "30s"
    method = "GET"
    path = "/fly-healthz"
    timeout = "10s"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
