# fly.toml app configuration file generated for arth-demo on 2026-05-12T04:11:13+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'arth-demo'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile.demo'
  [build.args]
    NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN = "phc_vG5JZXyDBeMkNbBNJqGhKB6uCN9bxot8FCR6RwTNsPm2"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  # Caddy answers this path immediately; / can still 502 while Next.js boots.
  [[http_service.checks]]
    grace_period = "45s"
    interval = "30s"
    method = "GET"
    path = "/fly-healthz"
    timeout = "10s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
